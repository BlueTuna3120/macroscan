<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MacroScan Icon Generator</title>
<style>
  body { font-family: sans-serif; background: #0d1117; color: #e2e8f0; padding: 30px; }
  h1 { margin-bottom: 6px; }
  p { color: #8891a8; margin-bottom: 24px; font-size: 14px; }
  .grid { display: flex; gap: 24px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  canvas { border-radius: 18%; border: 1px solid #2d3748; }
  button { background: linear-gradient(135deg,#3a86ff,#00d2ff); border: none; color: white;
           padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
  button:hover { opacity: 0.85; }
  .size { font-size: 12px; color: #6b7a99; }
</style>
</head>
<body>
<h1>MacroScan Icon Generator</h1>
<p>Open this file locally in your browser. Click each Download button, save the file into the <code>icons/</code> folder, then commit.</p>
<div class="grid" id="grid"></div>

<script>
const SIZES = [
  { px: 192, filename: 'icon-192.png' },
  { px: 512, filename: 'icon-512.png' },
  { px: 180, filename: 'icon-180.png' },
];

function makeIcon(px) {
  const canvas = document.createElement('canvas');
  canvas.width = px; canvas.height = px;
  const ctx = canvas.getContext('2d');

  // Background — dark navy matching the app
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, px, px);

  // Rounded corner feel via arc clip
  const r = px * 0.22;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(px - r, 0);
  ctx.quadraticCurveTo(px, 0, px, r);
  ctx.lineTo(px, px - r);
  ctx.quadraticCurveTo(px, px, px - r, px);
  ctx.lineTo(r, px);
  ctx.quadraticCurveTo(0, px, 0, px - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#0d1117';
  ctx.fill();
  ctx.clip();

  // Gradient accent circle behind text
  const grad = ctx.createRadialGradient(px/2, px/2, 0, px/2, px/2, px * 0.38);
  grad.addColorStop(0, 'rgba(58,134,255,0.18)');
  grad.addColorStop(1, 'rgba(0,210,255,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(px/2, px/2, px * 0.38, 0, Math.PI * 2);
  ctx.fill();

  // "MS" text
  const fontSize = Math.round(px * 0.38);
  ctx.font = `800 ${fontSize}px "DM Sans", "Segoe UI", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Gradient fill for text
  const tg = ctx.createLinearGradient(px * 0.25, px * 0.35, px * 0.75, px * 0.65);
  tg.addColorStop(0, '#3a86ff');
  tg.addColorStop(1, '#00d2ff');
  ctx.fillStyle = tg;
  ctx.fillText('MS', px / 2, px / 2 + px * 0.015);

  ctx.restore();
  return canvas;
}

const grid = document.getElementById('grid');
SIZES.forEach(({ px, filename }) => {
  const canvas = makeIcon(px);
  canvas.width = px; canvas.height = px;
  // Re-draw at display size for the preview
  const preview = makeIcon(px);

  const displaySize = Math.min(px, 128);
  const display = document.createElement('canvas');
  display.width = displaySize; display.height = displaySize;
  display.getContext('2d').drawImage(canvas, 0, 0, displaySize, displaySize);

  const btn = document.createElement('button');
  btn.textContent = `Download ${filename}`;
  btn.onclick = () => {
    const a = document.createElement('a');
    a.download = filename;
    a.href = canvas.toDataURL('image/png');
    a.click();
  };

  const item = document.createElement('div');
  item.className = 'item';
  item.innerHTML = `<div class="size">${px}×${px}</div>`;
  item.appendChild(display);
  item.appendChild(btn);
  grid.appendChild(item);
});
</script>
</body>
</html>
