<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MacroScan</title>
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MacroScan">
<link rel="apple-touch-icon" href="IMG_9455.jpeg">
<link rel="manifest" href="site.webmanifest">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e2e8f0; font-family: 'DM Sans', 'Segoe UI', sans-serif; min-height: 100vh; display: flex; justify-content: center; }
  #app { width: 100%; max-width: 480px; padding: 0 0 80px; }
  input, select, button { font-family: inherit; }

  .header { display: flex; align-items: center; justify-content: space-between; padding: 20px 20px 0; }
  .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .logo span { color: #3a86ff; }
  .logo-sub { font-size: 11px; color: #4a5568; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px; }

  .content { padding: 20px 20px 0; display: flex; flex-direction: column; gap: 14px; }
  .card { background: linear-gradient(135deg,#1a1f2e,#131824); border-radius: 16px; padding: 20px; border: 1px solid #1e2535; }
  .card-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .section-label { font-size: 13px; font-weight: 700; color: #8891a8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }

  label.field-label { display: block; font-size: 11px; color: #8891a8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  input[type=text], input[type=number], select { background: #1e2535; border: 1px solid #2d3748; border-radius: 10px; color: #e2e8f0; padding: 10px 14px; font-size: 14px; outline: none; width: 100%; }
  input:focus, select:focus { border-color: #3a86ff; }
  select option { background: #1e2535; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn-primary { background: linear-gradient(135deg,#3a86ff,#00d2ff); border: none; border-radius: 12px; color: white; padding: 13px 24px; font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: 0.04em; width: 100%; transition: opacity 0.15s; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.4; cursor: default; }
  .btn-secondary { background: #1e2535; border: 1px solid #2d3748; border-radius: 12px; color: #8891a8; padding: 11px 24px; font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: 0.04em; width: 100%; }
  .btn-secondary:hover { border-color: #4a5568; color: #e2e8f0; }
  .btn-secondary:disabled { opacity: 0.4; cursor: default; }
  .btn-small { background: #1e2535; border: 1px solid #2d3748; border-radius: 8px; color: #4a5568; font-size: 11px; padding: 4px 10px; cursor: pointer; }
  .btn-icon { background: none; border: 1px solid #2d3748; border-radius: 8px; color: #8891a8; padding: 8px 14px; font-size: 12px; cursor: pointer; }

  .toggle-group { display: flex; background: #111827; border-radius: 10px; padding: 3px; border: 1px solid #1e2535; width: fit-content; }
  .toggle-btn { background: transparent; border: none; border-radius: 8px; color: #6b7a99; padding: 8px 20px; cursor: pointer; text-align: center; transition: all 0.2s; }
  .toggle-btn.active { background: linear-gradient(135deg,#3a86ff,#00d2ff); color: white; }
  .toggle-btn .tb-label { font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
  .toggle-btn .tb-sub { font-size: 10px; opacity: 0.8; margin-top: 1px; }

  .goal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .goal-btn { background: #111827; border: 2px solid #1e2535; border-radius: 12px; padding: 14px 12px; cursor: pointer; text-align: left; transition: all 0.2s; }
  .goal-btn.active { background: linear-gradient(135deg,#1d3a6e,#162d5a); border-color: #3a86ff; }
  .goal-btn .goal-icon { font-size: 22px; margin-bottom: 6px; }
  .goal-btn .goal-name { font-size: 13px; font-weight: 700; color: #e2e8f0; }
  .goal-btn .goal-desc { font-size: 11px; color: #6b7a99; margin-top: 2px; }

  .calorie-bar-wrap { width: 100%; margin-bottom: 16px; }
  .calorie-bar-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .calorie-bar-label { color: #8891a8; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
  .calorie-bar-value { font-size: 13px; font-weight: 700; }
  .calorie-bar-track { height: 8px; background: #1e2535; border-radius: 4px; overflow: hidden; }
  .calorie-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(.4,2,.6,1); }

  .rings-row { display: flex; justify-content: space-around; }
  .ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .ring-label { font-size: 10px; color: #8891a8; letter-spacing: 0.04em; text-transform: uppercase; text-align: center; }
  .targets-row { display: flex; justify-content: space-around; margin-top: 8px; }
  .target-cell { text-align: center; }
  .target-cell .t-label { font-size: 11px; color: #4a5568; text-transform: uppercase; }
  .target-cell .t-val { font-size: 13px; font-weight: 600; }

  .saved-badge { font-size: 11px; background: #0d1f07; border: 1px solid #1a3a0a; border-radius: 8px; padding: 5px 10px; display: inline-flex; align-items: center; gap: 5px; }
  .saved-dot { color: #4ade80; }
  .saved-text { color: #4ade80; }

  .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .log-title { font-size: 14px; font-weight: 700; color: #8891a8; text-transform: uppercase; letter-spacing: 0.06em; }
  .log-entries { display: flex; flex-direction: column; gap: 8px; }
  .log-entry { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #111827; border-radius: 10px; }
  .log-entry-name { font-size: 13px; font-weight: 600; }
  .log-entry-weight { font-size: 11px; color: #6b7a99; }
  .log-entry-right { text-align: right; }
  .log-entry-cals { font-size: 13px; font-weight: 700; color: #3a86ff; }
  .log-entry-macros { font-size: 11px; color: #6b7a99; }
  .btn-delete { background: none; border: none; color: #4a5568; cursor: pointer; font-size: 16px; padding-left: 8px; }

  .error-box { background: #2d1a1a; border: 1px solid #7f1d1d; border-radius: 10px; padding: 12px; color: #ff6b6b; font-size: 13px; }
  .info-box { background: #0f1f35; border: 1px solid #1e3a5f; border-radius: 10px; padding: 12px; color: #6ba3d6; font-size: 13px; }

  .food-result-card { background: linear-gradient(135deg,#1a1f2e,#131824); border-radius: 16px; padding: 20px; border: 1px solid #2d3748; }
  .food-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .food-sub { font-size: 12px; color: #4a5568; margin-bottom: 16px; font-family: 'DM Mono', monospace; }
  .macro-tile { background: #111827; border-radius: 10px; padding: 12px 14px; }
  .macro-tile-label { font-size: 11px; color: #4a5568; text-transform: uppercase; letter-spacing: 0.06em; }
  .macro-tile-val { font-size: 20px; font-weight: 700; }
  .macro-tile-val span { font-size: 12px; color: #4a5568; margin-left: 2px; }
  .macro-tile-sub { font-size: 10px; color: #4a5568; }

  .amount-wrap { position: relative; }
  .amount-unit { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #4a5568; font-size: 12px; font-weight: 700; pointer-events: none; }
  .preview-row { margin-top: 12px; padding: 12px 14px; background: #111827; border-radius: 10px; display: flex; justify-content: space-between; }
  .preview-cell { text-align: center; }
  .preview-label { font-size: 10px; color: #4a5568; text-transform: uppercase; }
  .preview-val { font-size: 15px; font-weight: 700; }

  .custom-toggle { width: 100%; border-radius: 0; border: none; padding: 14px 16px; text-align: left; display: flex; justify-content: space-between; background: #1e2535; color: #8891a8; cursor: pointer; font-size: 13px; font-weight: 600; }
  .custom-toggle:hover { color: #e2e8f0; }
  .custom-body { padding: 16px; border-top: 1px solid #1e2535; display: none; }
  .custom-body.open { display: block; }

  .chart-card { background: linear-gradient(135deg,#1a1f2e,#131824); border-radius: 16px; padding: 18px; border: 1px solid #1e2535; }
  .chart-header { display:flex; justify-content:space-between; align-items:flex-end; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  .chart-title { font-size:16px; font-weight:700; }
  .chart-sub { font-size:11px; color:#6b7a99; margin-top:4px; }
  .chart-legend { display:flex; gap:10px; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:11px; color:#8891a8; }
  .legend-dot { width:10px; height:10px; border-radius:999px; display:inline-block; }
  .week-bars { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; align-items:end; height:180px; margin-top:6px; }
  .week-day { display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:6px; height:100%; }
  .week-bar-stack { height:130px; width:100%; max-width:34px; background:#111827; border:1px solid #1e2535; border-radius:10px; overflow:hidden; display:flex; flex-direction:column; justify-content:flex-end; }
  .week-bar-fill { width:100%; min-height:0; transition: height 0.5s; }
  .week-day-label { font-size:10px; color:#6b7a99; text-transform:uppercase; }
  .week-day-total { font-size:10px; font-weight:700; color:#e2e8f0; }
  .week-summary-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:16px; }
  .week-summary-cell { background:#111827; border-radius:10px; padding:10px 8px; text-align:center; }
  .week-summary-label { font-size:10px; color:#6b7a99; text-transform:uppercase; }
  .week-summary-val { font-size:14px; font-weight:700; margin-top:4px; }

  .nav-tabs { display: flex; background: #111827; border-top: 1px solid #1e2535; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; z-index: 100; }
  .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0 16px; cursor: pointer; border: none; background: none; color: #4a5568; transition: color 0.2s; font-family: inherit; }
  .nav-tab.active { color: #3a86ff; }
  .nav-tab .tab-icon { font-size: 20px; margin-bottom: 3px; }
  .nav-tab .tab-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }

  .hist-day { background: linear-gradient(135deg,#1a1f2e,#131824); border-radius: 16px; border: 1px solid #1e2535; overflow: hidden; }
  .hist-day-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; cursor: pointer; }
  .hist-day-date { font-size: 14px; font-weight: 700; }
  .hist-day-date.today { color: #3a86ff; }
  .hist-day-summary { font-size: 12px; color: #6b7a99; }
  .hist-day-cals { font-size: 14px; font-weight: 700; color: #3a86ff; }
  .hist-day-body { display: none; border-top: 1px solid #1e2535; }
  .hist-day-body.open { display: block; }
  .hist-macro-row { display: flex; justify-content: space-around; padding: 12px 16px; background: #0d1117; }
  .hist-macro-cell { text-align: center; }
  .hist-macro-label { font-size: 10px; color: #4a5568; text-transform: uppercase; letter-spacing: 0.06em; }
  .hist-macro-val { font-size: 15px; font-weight: 700; }
  .hist-entries { padding: 8px 12px 12px; display: flex; flex-direction: column; gap: 6px; }
  .hist-entry { display: flex; justify-content: space-between; padding: 8px 10px; background: #111827; border-radius: 8px; }
  .hist-entry-name { font-size: 12px; font-weight: 600; }
  .hist-entry-weight { font-size: 11px; color: #6b7a99; }
  .hist-entry-cals { font-size: 12px; font-weight: 700; color: #3a86ff; }
  .hist-entry-macros { font-size: 10px; color: #6b7a99; text-align: right; }
  .hist-bar { height: 4px; border-radius: 2px; margin: 0 16px 12px; background: #1e2535; overflow: hidden; }
  .hist-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg,#00d2ff,#3a86ff); }
  .hist-empty { text-align: center; color: #4a5568; font-size: 14px; padding: 40px 20px; }

  .scanner-modal { position:fixed; inset:0; background:rgba(5,8,12,0.92); z-index:300; display:flex; align-items:center; justify-content:center; padding:18px; }
  .scanner-card { width:100%; max-width:460px; background:linear-gradient(135deg,#151b29,#0f1420); border:1px solid #263248; border-radius:18px; overflow:hidden; }
  .scanner-top { padding:16px 18px 10px; display:flex; justify-content:space-between; align-items:center; }
  .scanner-title { font-size:16px; font-weight:700; }
  .scanner-sub { font-size:12px; color:#6b7a99; margin-top:4px; }
  .scanner-frame { position:relative; background:#02050a; aspect-ratio:4/3; display:flex; align-items:center; justify-content:center; overflow:hidden; max-height:260px; }
  #scannerVideo { width:100%; height:100%; object-fit:cover; }
  .scanner-guide { position:absolute; width:70%; height:90px; border:2px solid rgba(58,134,255,0.9); border-radius:12px; box-shadow:0 0 0 9999px rgba(0,0,0,0.3); }
  .scanner-guide::after { content:''; position:absolute; left:8%; right:8%; top:50%; height:2px; background:linear-gradient(90deg,transparent,#00d2ff,transparent); animation:scanline 1.8s linear infinite; }
  @keyframes scanline { 0%{transform:translateY(-30px);opacity:0} 50%{opacity:1} 100%{transform:translateY(30px);opacity:0} }
  .scanner-status { padding:10px 18px 0; font-size:12px; color:#8891a8; min-height:32px; }
  .scanner-actions { padding:14px 18px 16px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  .hidden { display: none !important; }
  .mt-10 { margin-top: 10px; }
  .mb-10 { margin-bottom: 10px; }
  .mb-12 { margin-bottom: 12px; }
  .hint { font-size: 11px; color: #4a5568; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="logo"><span>macro</span>scan</div>
      <div class="logo-sub" id="headerSub">Setup Required</div>
    </div>
    <div id="headerBtns" style="display:flex;gap:8px;"></div>
  </div>
  <div class="content" id="content"></div>
</div>

<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js" async
  onload="S && (S.zxingLoaded=true)" onerror="console.warn('ZXing failed')"></script>

<script>
'use strict';
const APP_VERSION = '1.1';

// ── Date ─────────────────────────────────────────────────────────────────
function getLocalDateStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
const TODAY = getLocalDateStr();

// ── State ─────────────────────────────────────────────────────────────────
const PROFILE_DEFAULTS = {
  weightLbs:'', heightFt:'', heightIn:'', weightKg:'', heightCm:'',
  age:'', gender:'', activity:'moderate', goal:'fat_loss'
};

const S = {
  screen: 'setup',
  unit: 'imperial',
  foodUnit: 'g',
  profile: { ...PROFILE_DEFAULTS },
  targets: null,
  entries: [],
  setupError: '',
  foodQuery: '',
  searchError: '',
  showCustom: false,
  searchResults: null,
  searchLoading: false,
  customFood: { name:'', calories:'', protein:'', carbs:'', fat:'' },
  scannedFood: null,
  foodReady: false,
  foodWeightDisplay: '100',
  scannerOpen: false,
  scannerStatus: '',
  scannerError: '',
  scannerManualCode: '',
  scannerActive: false,
  zxingLoaded: false,
  weightInput: '',
  _lastLookupId: 0,
  _searchId: 0,
};

// ── Storage ───────────────────────────────────────────────────────────────
function save() {
  try {
    localStorage.setItem('ms:profile',  JSON.stringify(S.profile));
    localStorage.setItem('ms:unit',     S.unit);
    localStorage.setItem('ms:foodUnit', S.foodUnit);
    if (S.targets) localStorage.setItem('ms:targets', JSON.stringify(S.targets));
    localStorage.setItem('ms:entries:' + TODAY, JSON.stringify(S.entries));
    let dates = getLoggedDates();
    if (S.entries.length > 0 && !dates.includes(TODAY)) dates.unshift(TODAY);
    if (S.entries.length === 0) dates = dates.filter(d => d !== TODAY);
    localStorage.setItem('ms:dates', JSON.stringify(dates));
  } catch(e) {}
}

function load() {
  try {
    const p = localStorage.getItem('ms:profile');
    if (p) S.profile = { ...PROFILE_DEFAULTS, ...JSON.parse(p) };
    if (S.profile.goal === 'recomp') S.profile.goal = 'fat_loss';
    const u = localStorage.getItem('ms:unit'); if (u) S.unit = u;
    const fu = localStorage.getItem('ms:foodUnit'); if (fu) S.foodUnit = fu;
    const t = localStorage.getItem('ms:targets');
    if (t) { S.targets = JSON.parse(t); S.screen = 'summary'; }
    const e = localStorage.getItem('ms:entries:' + TODAY);
    if (e) S.entries = JSON.parse(e);
    S.foodWeightDisplay = defaultAmountForUnit(S.foodUnit);
  } catch(e) {}
}

function getLoggedDates() {
  try { return JSON.parse(localStorage.getItem('ms:dates') || '[]'); } catch(e) { return []; }
}
function getEntriesForDate(date) {
  try { return JSON.parse(localStorage.getItem('ms:entries:' + date) || '[]'); } catch(e) { return []; }
}
function getWeightLog() {
  try { return JSON.parse(localStorage.getItem('ms:weightlog') || '[]'); } catch(e) { return []; }
}
function saveWeightLog(log) {
  try { localStorage.setItem('ms:weightlog', JSON.stringify(log)); } catch(e) {}
}

// ── Math ──────────────────────────────────────────────────────────────────
const lbsToKg  = l => l * 0.453592;
const ftInToCm = (f,i) => (f * 12 + parseFloat(i||0)) * 2.54;
const ozToG    = o => o * 28.3495;
const flozToG  = f => f * 29.5735;

function unitToGrams(val, unit) {
  switch (unit) {
    case 'g':
    case 'ml':   return val;
    case 'oz':   return ozToG(val);
    case 'floz': return flozToG(val);
    case 'srv': {
      const sg = S.scannedFood && S.scannedFood.servingGrams ? S.scannedFood.servingGrams : 100;
      return val * sg;
    }
    default: return val;
  }
}

function defaultAmountForUnit(unit) {
  switch(unit) {
    case 'oz':   return '3.5';
    case 'ml':   return '355';
    case 'floz': return '12';
    case 'srv':  return '1';
    default:     return '100';
  }
}

// ── BMR / TDEE ────────────────────────────────────────────────────────────
function bmr(wKg, hCm, age, gender) {
  return gender === 'male'
    ? 88.362 + 13.397*wKg + 4.799*hCm - 5.677*age
    : 447.593 + 9.247*wKg + 3.098*hCm - 4.33*age;
}
function tdee(b, act) {
  return b * ({ sedentary:1.2, light:1.375, moderate:1.55, active:1.725, very_active:1.9 }[act] || 1.55);
}

// ── Goals ─────────────────────────────────────────────────────────────────
const GOALS = {
  bulk:      { label:'Bulk',      icon:'🏋️', desc:'Calorie surplus · Build muscle mass',      detail:'+400 cal · Protein 0.9g/lb', calOffset:+400, proteinPerLb:0.9, carbPct:0.45, fatPct:0.25 },
  cut:       { label:'Cut',       icon:'✂️',  desc:'Calorie deficit · Maximize fat loss',      detail:'-400 cal · Protein 1.1g/lb', calOffset:-400, proteinPerLb:1.1, carbPct:0.32, fatPct:0.25 },
  lean_bulk: { label:'Lean Bulk', icon:'💪',  desc:'Minimal surplus · Muscle w/ minimal fat', detail:'+150 cal · Protein 1.0g/lb', calOffset:+150, proteinPerLb:1.0, carbPct:0.45, fatPct:0.30 },
  fat_loss:  { label:'Fat Loss',  icon:'🔥',  desc:'Calorie deficit · General fat loss',      detail:'-400 cal · Protein 0.9g/lb', calOffset:-400, proteinPerLb:0.9, carbPct:0.35, fatPct:0.30 },
};

// FIX: Protein set first; remaining calories split to carbs/fat so totals always match calorie target
function computeTargets(TDEE, goal, wLbs) {
  const g = GOALS[goal];
  const calories = Math.round(TDEE + g.calOffset);
  const protein = Math.round(wLbs * g.proteinPerLb);
  const remaining = Math.max(calories - protein * 4, 0);
  const totalRatio = g.carbPct + g.fatPct;
  const carbs = Math.round((remaining * (g.carbPct / totalRatio)) / 4);
  const fat   = Math.round((remaining * (g.fatPct  / totalRatio)) / 9);
  return { calories, protein, carbs, fat };
}

function getFoodWeightInGrams() {
  const v = parseFloat(S.foodWeightDisplay);
  if (!v || v <= 0) return 0;
  return unitToGrams(v, S.foodUnit);
}

function getTotals() {
  return S.entries.reduce(
    (a,e) => ({ calories:a.calories+e.calories, protein:a.protein+e.protein, carbs:a.carbs+e.carbs, fat:a.fat+e.fat }),
    { calories:0, protein:0, carbs:0, fat:0 }
  );
}
function getTotalsForDate(date) {
  const entries = date === TODAY ? S.entries : getEntriesForDate(date);
  return entries.reduce(
    (a,e) => ({ calories:a.calories+e.calories, protein:a.protein+e.protein, carbs:a.carbs+e.carbs, fat:a.fat+e.fat }),
    { calories:0, protein:0, carbs:0, fat:0 }
  );
}
function getDateRange(days) {
  const out = [], today = new Date(TODAY + 'T12:00:00');
  for (let i = days-1; i >= 0; i--) {
    const d = new Date(today); d.setDate(today.getDate()-i);
    out.push(d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'));
  }
  return out;
}
function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const today = new Date(TODAY + 'T12:00:00');
  const diff = Math.round((today - d) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
}
function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── Open Food Facts Search ────────────────────────────────────────────────
// FIX: Only use _100g fields — per-serving data is inconsistent across products
// FIX: searchId param lets doSearch() discard stale responses
async function searchFoodOnline(q) {
  const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&action=process&json=1&page_size=8&fields=product_name,nutriments,brands`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Network error');
  const data = await res.json();
  return (data.products || [])
    .filter(p => p.product_name && (p.nutriments||{})['energy-kcal_100g'])
    .map(p => {
      const n = p.nutriments || {};
      return {
        name:     p.product_name + (p.brands ? ` (${p.brands.split(',')[0].trim()})` : ''),
        calories: Math.round(Number(n['energy-kcal_100g']) || 0),
        protein:  Math.round((Number(n['proteins_100g'])      || 0) * 10) / 10,
        carbs:    Math.round((Number(n['carbohydrates_100g']) || 0) * 10) / 10,
        fat:      Math.round((Number(n['fat_100g'])           || 0) * 10) / 10,
        serving:  100, servingGrams: null, servingLabel: null,
      };
    });
}

// ── Ring SVG ──────────────────────────────────────────────────────────────
function ringHTML(value, max, color, label, size=80) {
  const pct = Math.min(value/max, 1);
  const r = (size-12)/2, circ = 2*Math.PI*r, dash = pct*circ;
  const cx = size/2, cy = size/2;
  return `<div class="ring-wrap">
    <svg width="${size}" height="${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1e2535" stroke-width="10"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="10"
        stroke-dasharray="${dash} ${circ}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
      <text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle"
        fill="white" style="font-size:13px;font-family:DM Sans,sans-serif;font-weight:700">${value}</text>
    </svg>
    <div class="ring-label">${label}</div>
  </div>`;
}

// ── Render ────────────────────────────────────────────────────────────────
// FIX: Only skip food-result re-render when amountInput is focused.
// All other screens still update normally (old code blocked ALL renders).
function render() {
  const focused = document.activeElement;
  const amountFocused = focused && focused.id === 'amountInput';

  renderHeader();

  if (S.screen === 'setup') renderSetup();
  else if (S.screen === 'summary') renderSummary(getTotals());
  else if (S.screen === 'search') {
    if (S.scannedFood && S.foodReady) {
      if (!amountFocused) renderFoodResult();
    } else {
      renderSearch();
    }
  }
  else if (S.screen === 'history') renderHistory();
  else if (S.screen === 'weight')  renderWeight();

  renderNav();

  const existing = document.getElementById('scannerModal');
  if (S.scannerOpen && !existing) {
    document.body.insertAdjacentHTML('beforeend', scannerModalHTML());
  } else if (!S.scannerOpen && existing) {
    existing.remove();
  }
}

function renderNav() {
  let nav = document.getElementById('nav-tabs');
  if (!nav) {
    nav = document.createElement('div');
    nav.id = 'nav-tabs'; nav.className = 'nav-tabs';
    document.getElementById('app').appendChild(nav);
  }
  nav.innerHTML = [
    { id:'summary', icon:'📊', label:'Today'    },
    { id:'history', icon:'📅', label:'History'  },
    { id:'weight',  icon:'⚖️',  label:'Weight'   },
    { id:'setup',   icon:'⚙️',  label:'Settings' },
  ].map(t => `
    <button class="nav-tab ${(S.screen===t.id||(t.id==='summary'&&S.screen==='search'))?'active':''}"
      onclick="navTo('${t.id}')">
      <div class="tab-icon">${t.icon}</div>
      <div class="tab-label">${t.label}</div>
    </button>`).join('');
}

// ── Weight Reminder ───────────────────────────────────────────────────────
function weightReminderHTML() {
  const log = getWeightLog();
  if (!log.length) return '';
  const sorted = [...log].sort((a,b) => a.ts - b.ts);
  const lastLogged = sorted[sorted.length-1].weight;
  const profileWeight = S.unit === 'imperial' ? parseFloat(S.profile.weightLbs) : parseFloat(S.profile.weightKg);
  if (!profileWeight) return '';
  const diff = Math.abs(profileWeight - lastLogged);
  if (diff < 8) return '';
  const unit = S.unit === 'imperial' ? 'lbs' : 'kg';
  return `<div style="background:linear-gradient(135deg,#2d1f00,#3d2a00);border:1px solid #f6ad55;border-radius:14px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start">
    <div style="font-size:20px">⚖️</div>
    <div><div style="font-size:13px;font-weight:700;color:#f6ad55;margin-bottom:4px">Time to recalculate your targets</div>
    <div style="font-size:12px;color:#d4a35a;line-height:1.5">Your logged weight (${lastLogged} ${unit}) differs from your profile by ${Math.round(diff*10)/10} ${unit}. Go to Settings, update your weight, and tap Recalculate.</div></div>
  </div>`;
}

// ── Weekly Chart ──────────────────────────────────────────────────────────
function renderWeeklyChart() {
  if (!S.targets) return '';
  const dates = getDateRange(7);
  const data = dates.map(date => ({ date, ...getTotalsForDate(date) }));
  const maxCal = Math.max(S.targets.calories * 1.1, ...data.map(d => d.calories), 1);
  const daysWithData = data.filter(d => d.calories > 0);
  const avg = key => daysWithData.length ? Math.round(daysWithData.reduce((s,d)=>s+d[key],0)/daysWithData.length) : 0;
  const hitDays = data.filter(d => d.calories > 0 && d.protein >= S.targets.protein && d.calories <= S.targets.calories * 1.1).length;
  return `
    <div class="chart-card">
      <div class="chart-header">
        <div><div class="chart-title">7-Day Overview</div><div class="chart-sub">Calories and macro split</div></div>
        <div class="chart-legend">
          <div class="legend-item"><span class="legend-dot" style="background:#ff6b6b"></span>P</div>
          <div class="legend-item"><span class="legend-dot" style="background:#ffd166"></span>C</div>
          <div class="legend-item"><span class="legend-dot" style="background:#06d6a0"></span>F</div>
        </div>
      </div>
      <div class="week-bars">
        ${data.map(d => {
          const mac = d.protein*4 + d.carbs*4 + d.fat*9 || 1;
          const pPct=d.protein*4/mac, cPct=d.carbs*4/mac, fPct=d.fat*9/mac;
          const h = Math.max(d.calories/maxCal*130, d.calories?4:0);
          const lbl = new Date(d.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'}).slice(0,1);
          const isToday = d.date === TODAY;
          return `<div class="week-day">
            <div class="week-day-total" style="color:${isToday?'#3a86ff':'#e2e8f0'}">${d.calories||''}</div>
            <div class="week-bar-stack" style="border-color:${isToday?'#3a86ff':'#1e2535'}">
              <div class="week-bar-fill" style="height:${h*fPct}px;background:#06d6a0"></div>
              <div class="week-bar-fill" style="height:${h*cPct}px;background:#ffd166"></div>
              <div class="week-bar-fill" style="height:${h*pPct}px;background:#ff6b6b"></div>
            </div>
            <div class="week-day-label" style="color:${isToday?'#3a86ff':'#6b7a99'}">${lbl}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="week-summary-grid">
        <div class="week-summary-cell"><div class="week-summary-label">Avg Cals</div><div class="week-summary-val" style="color:#3a86ff">${avg('calories')}</div></div>
        <div class="week-summary-cell"><div class="week-summary-label">Avg Protein</div><div class="week-summary-val" style="color:#ff6b6b">${avg('protein')}g</div></div>
        <div class="week-summary-cell"><div class="week-summary-label">Avg Carbs</div><div class="week-summary-val" style="color:#ffd166">${avg('carbs')}g</div></div>
        <div class="week-summary-cell" style="${hitDays===7?'cursor:pointer':''}" onclick="${hitDays===7?'showEasterEgg()':''}">
          <div class="week-summary-label">Goal Days</div>
          <div class="week-summary-val" style="color:${hitDays===7?'#ffd166':'#06d6a0'}">${hitDays===7?'🏆 7/7':hitDays+'/7'}</div>
        </div>
      </div>
    </div>`;
}

function showEasterEgg() {
  const existing = document.getElementById('easterEgg'); if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.id = 'easterEgg';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;box-sizing:border-box;';
  overlay.onclick = () => { cancelAnimationFrame(frame); overlay.remove(); };
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none';
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  overlay.appendChild(canvas);
  const msg = document.createElement('div');
  msg.style.cssText = 'position:relative;text-align:center;z-index:1';
  msg.innerHTML = '<div style="font-size:72px;margin-bottom:16px">🏆</div>'
    +'<div style="font-size:28px;font-weight:800;color:#ffd166;margin-bottom:10px;font-family:DM Sans,sans-serif">7 for 7!</div>'
    +'<div style="font-size:16px;color:#e2e8f0;font-family:DM Sans,sans-serif">Perfect week. You crushed it.</div>'
    +'<div style="font-size:13px;color:#8891a8;margin-top:16px;font-family:DM Sans,sans-serif">Tap anywhere to close</div>';
  overlay.appendChild(msg); document.body.appendChild(overlay);
  const ctx = canvas.getContext('2d');
  const pieces = Array.from({length:80},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,w:Math.random()*8+4,h:Math.random()*12+6,r:Math.random()*Math.PI*2,vx:(Math.random()-0.5)*4,vy:Math.random()*4+2,vr:(Math.random()-0.5)*0.2,color:['#ffd166','#3a86ff','#ff6b6b','#06d6a0','#fff'][Math.floor(Math.random()*5)]}));
  let frame;
  (function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;if(p.y>canvas.height){p.y=-20;p.x=Math.random()*canvas.width;}});
    frame=requestAnimationFrame(draw);
  })();
}

// ── Weight Tracker ────────────────────────────────────────────────────────
function addWeightEntry() {
  const val = parseFloat(S.weightInput);
  if (!val || val <= 0) return;
  const log = getWeightLog();
  const now = new Date();
  log.push({ date:TODAY, time:now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}), ts:Date.now(), weight:val });
  saveWeightLog(log);
  S.weightInput = '';
  renderWeight();
}

function deleteWeightEntry(ts) {
  saveWeightLog(getWeightLog().filter(e => e.ts !== ts));
  renderWeight();
}

function renderWeight() {
  const unit = S.unit === 'imperial' ? 'lbs' : 'kg';
  const log = getWeightLog();
  const sorted = [...log].sort((a,b) => a.ts - b.ts);

  function trendLine(pts) {
    if (pts.length < 2) return [];
    const n=pts.length, sumX=pts.reduce((s,_,i)=>s+i,0), sumY=pts.reduce((s,p)=>s+p.weight,0);
    const sumXY=pts.reduce((s,p,i)=>s+i*p.weight,0), sumX2=pts.reduce((s,_,i)=>s+i*i,0);
    const m=(n*sumXY-sumX*sumY)/(n*sumX2-sumX*sumX), b=(sumY-m*sumX)/n;
    return pts.map((_,i)=>Math.round((m*i+b)*10)/10);
  }

  function buildChart() {
    if (!sorted.length) return '';
    const W=320,H=160,PAD={top:20,right:16,bottom:30,left:40};
    const cW=W-PAD.left-PAD.right,cH=H-PAD.top-PAD.bottom;
    const weights=sorted.map(e=>e.weight),minW=Math.min(...weights),maxW=Math.max(...weights);
    const range=maxW-minW||2,padR=range*0.15,yMin=minW-padR,yMax=maxW+padR;
    const xScale=i=>PAD.left+(sorted.length===1?cW/2:(i/(sorted.length-1))*cW);
    const yScale=v=>PAD.top+cH-((v-yMin)/(yMax-yMin))*cH;
    const linePath=sorted.map((e,i)=>`${i===0?'M':'L'}${xScale(i).toFixed(1)},${yScale(e.weight).toFixed(1)}`).join(' ');
    const trend=trendLine(sorted);
    const trendPath=trend.length>=2?`M${xScale(0).toFixed(1)},${yScale(trend[0]).toFixed(1)} L${xScale(trend.length-1).toFixed(1)},${yScale(trend[trend.length-1]).toFixed(1)}`:'';
    const fillPath=linePath+` L${xScale(sorted.length-1).toFixed(1)},${(PAD.top+cH).toFixed(1)} L${xScale(0).toFixed(1)},${(PAD.top+cH).toFixed(1)} Z`;
    const labelIdxs=sorted.length<=5?sorted.map((_,i)=>i):[0,1,2,3,4].map(i=>Math.round(i*(sorted.length-1)/4));
    const xLabels=[...new Set(labelIdxs)].map(i=>{const d=new Date(sorted[i].date+'T12:00:00');return`<text x="${xScale(i).toFixed(1)}" y="${H-6}" text-anchor="middle" fill="#6b7a99" font-size="9" font-family="DM Sans,sans-serif">${(d.getMonth()+1)+'/'+d.getDate()}</text>`;}).join('');
    const yLabels=[0.1,0.5,0.9].map(f=>{const v=yMin+(yMax-yMin)*f;return`<text x="${PAD.left-6}" y="${(yScale(v)+3).toFixed(1)}" text-anchor="end" fill="#6b7a99" font-size="9" font-family="DM Sans,sans-serif">${Math.round(v)}</text>`;}).join('');
    const dots=sorted.map((e,i)=>`<circle cx="${xScale(i).toFixed(1)}" cy="${yScale(e.weight).toFixed(1)}" r="3.5" fill="#3a86ff" stroke="#0d1117" stroke-width="1.5"/>`).join('');
    return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;margin:8px 0">
      <defs><linearGradient id="wGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#3a86ff" stop-opacity="0.3"/><stop offset="100%" stop-color="#3a86ff" stop-opacity="0"/></linearGradient></defs>
      <line x1="${PAD.left}" y1="${PAD.top}" x2="${PAD.left}" y2="${PAD.top+cH}" stroke="#1e2535" stroke-width="1"/>
      <line x1="${PAD.left}" y1="${PAD.top+cH}" x2="${PAD.left+cW}" y2="${PAD.top+cH}" stroke="#1e2535" stroke-width="1"/>
      <path d="${fillPath}" fill="url(#wGrad)"/>
      <path d="${linePath}" fill="none" stroke="#3a86ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      ${trendPath?`<path d="${trendPath}" fill="none" stroke="#ffd166" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round"/>`:''}
      ${dots}${yLabels}${xLabels}
    </svg>
    ${trendPath?'<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><svg width="18" height="8"><line x1="0" y1="4" x2="18" y2="4" stroke="#ffd166" stroke-width="1.5" stroke-dasharray="4,2"/></svg><span style="font-size:11px;color:#8891a8">Trend</span><svg width="18" height="8" style="margin-left:8px"><line x1="0" y1="4" x2="18" y2="4" stroke="#3a86ff" stroke-width="2"/></svg><span style="font-size:11px;color:#8891a8">Actual</span></div>':''}`;
  }

  function statsHTML() {
    if (!sorted.length) return '';
    const first=sorted[0].weight,last=sorted[sorted.length-1].weight;
    const diff=Math.round((last-first)*10)/10,sign=diff>0?'+':'';
    const color=diff<0?'#06d6a0':diff>0?'#ff6b6b':'#8891a8';
    return `<div style="display:flex;gap:10px;margin-bottom:12px">
      <div class="macro-tile" style="flex:1"><div class="macro-tile-label">Current</div><div class="macro-tile-val" style="color:#3a86ff">${last}<span style="font-size:11px"> ${unit}</span></div></div>
      <div class="macro-tile" style="flex:1"><div class="macro-tile-label">Starting</div><div class="macro-tile-val" style="color:#8891a8">${first}<span style="font-size:11px"> ${unit}</span></div></div>
      <div class="macro-tile" style="flex:1"><div class="macro-tile-label">Change</div><div class="macro-tile-val" style="color:${color}">${sign}${diff}<span style="font-size:11px"> ${unit}</span></div></div>
    </div>`;
  }

  const logRows = [...sorted].reverse().map(e => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1e2535">
      <div><div style="font-size:14px;font-weight:600;color:#e2e8f0">${e.weight} ${unit}</div>
        <div style="font-size:11px;color:#6b7a99">${formatDate(e.date)} · ${e.time}</div></div>
      <button onclick="deleteWeightEntry(${e.ts})" style="background:none;border:none;color:#4a5568;font-size:16px;cursor:pointer;padding:4px 8px">×</button>
    </div>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div style="font-size:13px;font-weight:700;color:#8891a8;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px">Log Weight</div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="amount-wrap" style="flex:1">
          <input type="text" inputmode="decimal" id="weightInput" placeholder="e.g. 268.5"
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
            value="${S.weightInput}" style="padding-right:44px"
            onkeydown="if(event.key==='Enter'){S.weightInput=this.value;addWeightEntry();}else{S.weightInput=this.value;}">
          <span class="amount-unit" style="font-size:11px">${unit}</span>
        </div>
        <button class="btn-primary" style="width:auto;padding:12px 18px;border-radius:12px;white-space:nowrap"
          onclick="S.weightInput=document.getElementById('weightInput').value;addWeightEntry()">+ Log</button>
      </div>
    </div>
    ${sorted.length > 0 ? `
    <div class="card">
      <div style="font-size:13px;font-weight:700;color:#8891a8;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">Progress</div>
      ${statsHTML()}${buildChart()}
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:700;color:#8891a8;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">History</div>
      ${logRows}
    </div>` : `
    <div class="card" style="text-align:center;padding:40px 20px">
      <div style="font-size:32px;margin-bottom:12px">⚖️</div>
      <div style="color:#8891a8;font-size:14px">No weigh-ins yet.</div>
      <div style="color:#6b7a99;font-size:12px;margin-top:6px">Log your first weight above to start tracking.</div>
    </div>`}`;
}

              <span style="color:#4a5568;font-size:12px" id="arrow-hist-${di}">▼</span>

            <div class="hist-macro-row">

              <div class="hist-macro-cell"><div class="hist-macro-label">Carbs</div><div class="hist-macro-val" style="color:#ffd166">${Math.round(totals.carbs)}g</div></div>

            </div>
            ${entries.length?`
            <div class="hist-entries">

        <button class="btn-secondary" onclick="stopScanner()">Stop Camera</button>

function openScanner() {
  S.scannedFood=null; S.foodReady=false; S.searchResults=null;
  S.foodQuery=''; S.searchError=''; S.scannerManualCode='';
  S.scannerOpen=true; S.scannerError=''; S.scannerStatus='Tap Start Camera to begin.';
  _scanLock=false; _lastCode=null;
  if(_scanReader){try{_scanReader.reset();}catch(e){}_scanReader=null;}
  render();
}
function closeScanner(){stopScanner();S.scannerOpen=false;render();}

function stopScanner() {
  try{if(_scanControls){_scanControls.stop();_scanControls=null;}}catch(e){}
  try{if(_scanReader){_scanReader.reset();_scanReader=null;}}catch(e){}
  const video=document.getElementById('scannerVideo');
  if(video&&video.srcObject){try{video.srcObject.getTracks().forEach(t=>t.stop());}catch(e){}video.srcObject=null;}
  S.scannerActive=false;
}

async function startScanner() {
  const statusEl=document.getElementById('scannerStatus');
  const setStatus=msg=>{S.scannerStatus=msg;if(statusEl)statusEl.textContent=msg;};
  if(!window.ZXing){setStatus('Barcode library still loading — wait and try again.');return;}
  stopScanner(); _scanLock=false;
  setStatus('Requesting camera permission…');
  try {
    _scanReader=new ZXing.BrowserMultiFormatReader();
    _scanControls=await _scanReader.decodeFromVideoDevice(undefined,'scannerVideo',(result,err)=>{
      if(!result||_scanLock)return;
      const code=result.getText();
      if(code===_lastCode)return;
      _scanLock=true; _lastCode=code;
      stopScanner(); lookupBarcode(code);
    });
    S.scannerActive=true;
    setStatus('Scanning… hold barcode inside the frame.');
    const btn=document.getElementById('startScanBtn');
    if(btn)btn.textContent='Scanning…';
  } catch(e) {
    S.scannerError='Camera permission denied or unavailable. Use manual entry below.';
    setStatus(S.scannerError);
  }
}

// ── Barcode Lookup ────────────────────────────────────────────────────────
// FIX: No User-Agent header (forbidden browser header)
// FIX: serving_quantity only used as grams when serving_quantity_unit is 'g' or absent
// FIX: Lookup ID prevents stale async responses from overwriting newer results
async function lookupBarcode(rawCode) {
  const code = String(rawCode||'').trim();
  if (!code) return;
  const lookupId = Date.now();
  S._lastLookupId = lookupId;
  S.scannerManualCode = code;
  S.searchError = '';
  const statusEl = document.getElementById('scannerStatus');
  if (statusEl) statusEl.textContent = 'Looking up ' + code + '…';
  try {
    const res = await fetch(
      `https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(code)}?fields=product_name,nutriments,serving_quantity,serving_quantity_unit,serving_size`
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.status === 1 && data.product) {
      const n = data.product.nutriments || {};
      const name = data.product.product_name || ('Barcode ' + code);
      const calories = Number(n['energy-kcal_100g'] ?? n['energy-kcal'] ?? 0);
      const protein  = Number(n['proteins_100g']      ?? 0);
      const carbs    = Number(n['carbohydrates_100g'] ?? 0);
      const fat      = Number(n['fat_100g']           ?? 0);
      // Only use serving_quantity when unit is grams (or unspecified, which defaults to grams)
      const sqUnit = (data.product.serving_quantity_unit || '').toLowerCase();
      const rawSQ  = parseFloat(data.product.serving_quantity);
      const servingGrams = (!isNaN(rawSQ) && rawSQ > 0 && (sqUnit === 'g' || sqUnit === '')) ? rawSQ : null;
      const servingLabel = data.product.serving_size || null;
      if (name && (calories || protein || carbs || fat)) {
        if (S._lastLookupId !== lookupId) return;
        S.scannedFood = {
          name, barcode:code, serving:100,
          calories:Math.round(calories),
          protein: Math.round(protein*10)/10,
          carbs:   Math.round(carbs*10)/10,
          fat:     Math.round(fat*10)/10,
          servingGrams, servingLabel,
        };
        S.foodReady=true; S.searchError='';
        S.foodUnit = servingGrams ? 'srv' : 'g';
        S.foodWeightDisplay = servingGrams ? '1' : '100';
        S.scannerOpen=false; stopScanner(); render(); return;
      }
    }
  } catch(e) { /* fall through */ }
  if (S._lastLookupId !== lookupId) return;
  S.searchError = `No product found for barcode "${code}". Try searching by name or use Custom Entry.`;
  if (statusEl) statusEl.textContent = S.searchError;
  S.scannerOpen=false; stopScanner(); render();
}

function promptBarcode() {
  const code = prompt('Enter barcode number (UPC / EAN):');
  if (code && code.trim()) lookupBarcode(code.trim());
}

// ── Handlers ──────────────────────────────────────────────────────────────
function setUnit(u){S.unit=u;save();render();}
function setFoodUnit(u){S.foodUnit=u;S.foodWeightDisplay=defaultAmountForUnit(u);render();}
function goSearch(){stopScanner();S.scannerOpen=false;S.screen='search';S.scannedFood=null;S.foodReady=false;S.searchError='';S.searchResults=null;S.searchLoading=false;S.scannerManualCode='';render();}
function toggleCustom(){S.showCustom=!S.showCustom;render();}

function handleSetup() {
  S.setupError='';
  const p=S.profile;
  if(!p.gender){S.setupError='Please select a biological sex for accurate BMR calculation.';render();return;}
  let wKg,hCm;
  if(S.unit==='metric'){
    const rw=parseFloat(p.weightKg),rh=parseFloat(p.heightCm);
    if(!rw||rw<=0){S.setupError='Please enter a valid weight.';render();return;}
    if(!rh||rh<=0){S.setupError='Please enter a valid height.';render();return;}
    wKg=rw;hCm=rh;
  } else {
    const rw=parseFloat(p.weightLbs),rf=parseFloat(p.heightFt);
    if(!rw||rw<=0){S.setupError='Please enter a valid weight in lbs.';render();return;}
    if(!rf||rf<=0){S.setupError='Please enter a valid height (feet).';render();return;}
    wKg=lbsToKg(rw);hCm=ftInToCm(rf,p.heightIn);
  }
  const wLbs=wKg/0.453592;
  const b=bmr(wKg,hCm,parseInt(p.age)||30,p.gender);
  S.targets=computeTargets(tdee(b,p.activity),p.goal,wLbs);
  S.screen='summary';
  save();render();
}

// FIX: searchId prevents stale responses from overwriting newer search results
async function doSearch() {
  const q=(document.getElementById('foodQueryInput')?.value||S.foodQuery).trim();
  S.foodQuery=q;
  if(!q)return;
  const searchId=Date.now();
  S._searchId=searchId;
  S.searchError='';S.searchResults=null;S.searchLoading=true;
  render();
  try {
    const results=await searchFoodOnline(q);
    if(S._searchId!==searchId)return;
    S.searchLoading=false;
    if(results.length>0){S.searchResults=results;S.searchError='';}
    else{S.searchResults=[];S.searchError=`No results for "${q}". Try a different name or use Custom Entry below.`;}
  } catch(e) {
    if(S._searchId!==searchId)return;
    S.searchLoading=false;S.searchError='Search failed — check your internet connection.';
  }
  render();
}

function useCustomFood() {
  if(!S.customFood.name)return;
  S.scannedFood={name:S.customFood.name,calories:parseFloat(S.customFood.calories)||0,protein:parseFloat(S.customFood.protein)||0,carbs:parseFloat(S.customFood.carbs)||0,fat:parseFloat(S.customFood.fat)||0,serving:100,barcode:'custom',servingGrams:null,servingLabel:null};
  S.foodReady=true;S.foodUnit='g';S.foodWeightDisplay='100';
  S.customFood={name:'',calories:'',protein:'',carbs:'',fat:''};
  S.showCustom=false;render();
}

function addEntry() {
  const f=S.scannedFood;if(!f)return;
  const inputEl=document.getElementById('amountInput');
  if(inputEl)S.foodWeightDisplay=inputEl.value||S.foodWeightDisplay;
  const grams=getFoodWeightInGrams();
  if(!grams||grams<=0)return;
  const ratio=grams/100;  // always per 100g
  const displayUnit=S.foodUnit==='srv'?(f.servingLabel||'serving'):S.foodUnit;
  S.entries.push({
    id:Date.now(),name:f.name,grams:Math.round(grams*10)/10,
    displayWeight:parseFloat(S.foodWeightDisplay),displayUnit,
    calories:Math.round(f.calories*ratio),
    protein: Math.round(f.protein*ratio*10)/10,
    carbs:   Math.round(f.carbs*ratio*10)/10,
    fat:     Math.round(f.fat*ratio*10)/10,
  });
  S.scannedFood=null;S.foodReady=false;S.foodQuery='';S.screen='summary';
  S.foodUnit='g';S.foodWeightDisplay='100';
  save();render();
}

function deleteEntry(i){S.entries.splice(i,1);save();render();}

// ── Export / Import ───────────────────────────────────────────────────────
function buildPayload() {
  const dates=getLoggedDates(),entries={};
  dates.forEach(d=>{entries[d]=getEntriesForDate(d);});
  if(S.entries.length>0&&!entries[TODAY])entries[TODAY]=S.entries;
  return{version:APP_VERSION,exportedAt:new Date().toISOString(),profile:S.profile,unit:S.unit,foodUnit:S.foodUnit,targets:S.targets,dates,entries,weightLog:getWeightLog()};
}

function showExportModal() {
  let json;
  try{json=JSON.stringify(buildPayload(),null,2);}catch(e){alert('Export failed: '+e.message);return;}
  const existing=document.getElementById('exportModal');if(existing)existing.remove();
  const modal=document.createElement('div');
  modal.id='exportModal';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;flex-direction:column;padding:20px;box-sizing:border-box;';
  const inner=document.createElement('div');
  inner.style.cssText='background:#1a2033;border-radius:16px;display:flex;flex-direction:column;height:100%;overflow:hidden;padding:20px;gap:12px';
  const header=document.createElement('div');
  header.style.cssText='display:flex;justify-content:space-between;align-items:center';
  header.innerHTML='<div><div style="font-size:16px;font-weight:700;color:#e2e8f0">Your Backup Data</div><div style="font-size:12px;color:#8891a8;margin-top:2px">Tap Select All, then Copy, then paste into Notes or email</div></div>';
  const doneBtn=document.createElement('button');
  doneBtn.textContent='Done';doneBtn.style.cssText='background:#2d3748;border:none;color:#e2e8f0;border-radius:10px;padding:8px 14px;font-size:13px;font-family:inherit;cursor:pointer';
  doneBtn.onclick=()=>modal.remove();header.appendChild(doneBtn);
  const ta=document.createElement('textarea');
  ta.id='exportText';ta.readOnly=true;
  ta.style.cssText='flex:1;background:#0d1117;border:1px solid #2d3748;border-radius:12px;color:#a0aec0;font-size:11px;font-family:monospace;padding:12px;resize:none;-webkit-user-select:text;user-select:text;line-height:1.5';
  ta.value=json;
  const copyBtn=document.createElement('button');
  copyBtn.id='copyBtn';copyBtn.textContent='Select All & Copy';
  copyBtn.style.cssText='background:linear-gradient(135deg,#3a86ff,#00d2ff);border:none;color:#fff;border-radius:12px;padding:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;width:100%;flex-shrink:0';
  copyBtn.onclick=()=>{ta.readOnly=false;ta.focus();ta.setSelectionRange(0,ta.value.length);let copied=false;try{copied=document.execCommand('copy');}catch(e){}ta.readOnly=true;copyBtn.textContent=copied?'✓ Copied to Clipboard!':'Text Selected — Long-press to Copy';};
  const hint=document.createElement('div');
  hint.style.cssText='font-size:11px;color:#6b7a99;text-align:center;margin-top:-4px';
  hint.textContent='If copy fails, long-press the text and choose Select All → Copy';
  inner.appendChild(header);inner.appendChild(ta);inner.appendChild(hint);inner.appendChild(copyBtn);
  modal.appendChild(inner);document.body.appendChild(modal);
}

function showImportModal() {
  const existing=document.getElementById('importModal');if(existing)existing.remove();
  const modal=document.createElement('div');
  modal.id='importModal';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;flex-direction:column;padding:20px;box-sizing:border-box;';
  modal.innerHTML=`<div style="background:#1a2033;border-radius:16px;display:flex;flex-direction:column;height:100%;overflow:hidden;padding:20px;gap:12px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:16px;font-weight:700;color:#e2e8f0">Import Backup</div>
        <div style="font-size:12px;color:#8891a8;margin-top:2px">Paste your backup text below</div></div>
      <button onclick="document.getElementById('importModal').remove()" style="background:#2d3748;border:none;color:#e2e8f0;border-radius:10px;padding:8px 14px;font-size:13px;font-family:inherit;cursor:pointer">Cancel</button>
    </div>
    <textarea id="importText" placeholder="Paste your backup JSON here..." style="flex:1;background:#0d1117;border:1px solid #2d3748;border-radius:12px;color:#a0aec0;font-size:11px;font-family:monospace;padding:12px;resize:none;-webkit-user-select:text;user-select:text;line-height:1.5"></textarea>
    <div id="importError" style="color:#ff6b6b;font-size:12px;display:none"></div>
    <button onclick="doImportFromText()" style="background:linear-gradient(135deg,#3a86ff,#00d2ff);border:none;color:#fff;border-radius:12px;padding:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;width:100%">Import Data</button>
  </div>`;
  document.body.appendChild(modal);
}

function doImportFromText() {
  const text=document.getElementById('importText').value.trim();
  const errEl=document.getElementById('importError');
  try {
    const data=JSON.parse(text);
    if(!data.profile||!data.entries)throw new Error('Invalid backup');
    // FIX: Merge into defaults so missing fields don't break the app
    S.profile={...PROFILE_DEFAULTS,...data.profile};
    if(S.profile.goal==='recomp')S.profile.goal='fat_loss';
    if(data.unit)S.unit=data.unit;
    if(data.foodUnit)S.foodUnit=data.foodUnit;
    if(data.targets)S.targets=data.targets;
    Object.entries(data.entries).forEach(([date,entries])=>{localStorage.setItem('ms:entries:'+date,JSON.stringify(entries));});
    const dates=data.dates||[];
    if(data.entries[TODAY]&&!dates.includes(TODAY))dates.unshift(TODAY);
    localStorage.setItem('ms:dates',JSON.stringify(dates));
    S.entries=data.entries[TODAY]||[];
    if(data.weightLog)saveWeightLog(data.weightLog);
    localStorage.setItem('ms:profile',JSON.stringify(S.profile));
    localStorage.setItem('ms:unit',S.unit);
    localStorage.setItem('ms:foodUnit',S.foodUnit);
    if(S.targets)localStorage.setItem('ms:targets',JSON.stringify(S.targets));
    S.screen=S.targets?'summary':'setup';
    document.getElementById('importModal').remove();
    alert('Backup restored successfully!');
    render();
  } catch(e) {
    errEl.textContent='Invalid backup data. Make sure you pasted the full text.';
    errEl.style.display='block';
  }
}

function exportData(){showExportModal();}
function importData(){showImportModal();}
function updateApp(){if(confirm('Export your backup first so nothing is lost.\n\nTap OK to reload and get the latest version.'))window.location.href=window.location.href.split('?')[0]+'?v='+Date.now();}

// ── Boot ──────────────────────────────────────────────────────────────────
load();
render();
</script>
