<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MacroScan</title>
<link rel="apple-touch-icon" href="icons/icon-512.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MacroScan">
<link rel="manifest" href="site.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-512.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e2e8f0; font-family: 'DM Sans', 'Segoe UI', sans-serif; min-height: 100vh; display: flex; justify-content: center; }
  #app { width: 100%; max-width: 480px; padding: 0 0 80px; }
  input, select, button { font-family: inherit; }
  input[type=number]::-webkit-inner-spin-button { opacity: 1; }

  .header { display: flex; align-items: center; justify-content: space-between; padding: 20px 20px 0; }
  .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .logo span { color: #3a86ff; }
  .logo-sub { font-size: 11px; color: #4a5568; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px; }

  .content { padding: 20px 20px 0; display: flex; flex-direction: column; gap: 14px; }
  .card { background: linear-gradient(135deg,#1a1f2e,#131824); border-radius: 16px; padding: 20px; border: 1px solid #1e2535; }
  .card-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .section-label { font-size: 13px; font-weight: 700; color: #8891a8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }

  label.field-label { display: block; font-size: 11px; color: #8891a8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  input[type=text], input[type=number], select {
    background: #1e2535; border: 1px solid #2d3748; border-radius: 10px; color: #e2e8f0;
    padding: 10px 14px; font-size: 14px; outline: none; width: 100%;
  }
  input:focus, select:focus { border-color: #3a86ff; }
  select option { background: #1e2535; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn-primary {
    background: linear-gradient(135deg,#3a86ff,#00d2ff); border: none; border-radius: 12px;
    color: white; padding: 13px 24px; font-size: 14px; font-weight: 700; cursor: pointer;
    letter-spacing: 0.04em; width: 100%; transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.5; cursor: default; }
  .btn-secondary {
    background: #1e2535; border: 1px solid #2d3748; border-radius: 12px;
    color: #8891a8; padding: 11px 24px; font-size: 13px; font-weight: 600; cursor: pointer;
    letter-spacing: 0.04em; width: 100%;
  }
  .btn-secondary:hover { border-color: #4a5568; color: #e2e8f0; }
  .btn-small {
    background: #1e2535; border: 1px solid #2d3748; border-radius: 8px;
    color: #4a5568; font-size: 11px; padding: 4px 10px; cursor: pointer;
  }
  .btn-icon { background: none; border: 1px solid #2d3748; border-radius: 8px; color: #8891a8; padding: 8px 14px; font-size: 12px; cursor: pointer; }

  .toggle-group { display: flex; background: #111827; border-radius: 10px; padding: 3px; border: 1px solid #1e2535; width: fit-content; }
  .toggle-btn {
    background: transparent; border: none; border-radius: 8px; color: #6b7a99;
    padding: 8px 20px; cursor: pointer; text-align: center; transition: all 0.2s;
  }
  .toggle-btn.active { background: linear-gradient(135deg,#3a86ff,#00d2ff); color: white; }
  .toggle-btn .tb-label { font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
  .toggle-btn .tb-sub { font-size: 10px; opacity: 0.8; margin-top: 1px; }

  .goal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .goal-btn {
    background: #111827; border: 2px solid #1e2535; border-radius: 12px;
    padding: 14px 12px; cursor: pointer; text-align: left; transition: all 0.2s;
  }
  .goal-btn.active { background: linear-gradient(135deg,#1d3a6e,#162d5a); border-color: #3a86ff; }
  .goal-btn .goal-icon { font-size: 22px; margin-bottom: 6px; }
  .goal-btn .goal-name { font-size: 13px; font-weight: 700; color: #e2e8f0; }
  .goal-btn .goal-desc { font-size: 11px; color: #6b7a99; margin-top: 2px; }

  .calorie-bar-wrap { width: 100%; margin-bottom: 16px; }
  .calorie-bar-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .calorie-bar-label { color: #8891a8; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
  .calorie-bar-value { font-size: 13px; font-weight: 700; }
  .calorie-bar-track { height: 8px; background: #1e2535; border-radius: 4px; overflow: hidden; }
  .calorie-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(.4,2,.6,1); }

  .rings-row { display: flex; justify-content: space-around; }
  .ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .ring-label { font-size: 10px; color: #8891a8; letter-spacing: 0.04em; text-transform: uppercase; text-align: center; }
  .targets-row { display: flex; justify-content: space-around; margin-top: 8px; }
  .target-cell { text-align: center; }
  .target-cell .t-label { font-size: 11px; color: #4a5568; text-transform: uppercase; }
  .target-cell .t-val { font-size: 13px; font-weight: 600; }

  .saved-badge { font-size: 11px; background: #0d1f07; border: 1px solid #1a3a0a; border-radius: 8px; padding: 5px 10px; display: inline-flex; align-items: center; gap: 5px; }
  .saved-dot { color: #4ade80; }
  .saved-text { color: #4ade80; }

  .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .log-title { font-size: 14px; font-weight: 700; color: #8891a8; text-transform: uppercase; letter-spacing: 0.06em; }
  .log-entries { display: flex; flex-direction: column; gap: 8px; }
  .log-entry { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #111827; border-radius: 10px; }
  .log-entry-name { font-size: 13px; font-weight: 600; }
  .log-entry-weight { font-size: 11px; color: #6b7a99; }
  .log-entry-right { text-align: right; }
  .log-entry-cals { font-size: 13px; font-weight: 700; color: #3a86ff; }
  .log-entry-macros { font-size: 11px; color: #6b7a99; }
  .btn-delete { background: none; border: none; color: #4a5568; cursor: pointer; font-size: 16px; padding-left: 8px; }

  .error-box { background: #2d1a1a; border: 1px solid #7f1d1d; border-radius: 10px; padding: 12px; color: #ff6b6b; font-size: 13px; }
  .setup-hint { font-size: 11px; color: #4a5568; margin-top: 8px; }

  .food-result-card { background: linear-gradient(135deg,#1a1f2e,#131824); border-radius: 16px; padding: 20px; border: 1px solid #2d3748; }
  .food-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .food-sub { font-size: 12px; color: #4a5568; margin-bottom: 16px; font-family: 'DM Mono', monospace; }
  .macro-tile { background: #111827; border-radius: 10px; padding: 12px 14px; }
  .macro-tile-label { font-size: 11px; color: #4a5568; text-transform: uppercase; letter-spacing: 0.06em; }
  .macro-tile-val { font-size: 20px; font-weight: 700; }
  .macro-tile-val span { font-size: 12px; color: #4a5568; margin-left: 2px; }
  .macro-tile-sub { font-size: 10px; color: #4a5568; }

  .amount-wrap { position: relative; }
  .amount-unit { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #4a5568; font-size: 12px; font-weight: 700; pointer-events: none; }

  .preview-row { margin-top: 12px; padding: 12px 14px; background: #111827; border-radius: 10px; display: flex; justify-content: space-between; }
  .preview-cell { text-align: center; }
  .preview-label { font-size: 10px; color: #4a5568; text-transform: uppercase; }
  .preview-val { font-size: 15px; font-weight: 700; }

  .custom-toggle { width: 100%; border-radius: 0; border: none; padding: 14px 16px; text-align: left; display: flex; justify-content: space-between; background: #1e2535; color: #8891a8; cursor: pointer; font-size: 13px; font-weight: 600; }
  .custom-toggle:hover { color: #e2e8f0; }
  .custom-body { padding: 16px; border-top: 1px solid #1e2535; display: none; }
  .custom-body.open { display: block; }

  @keyframes scanline { 0%,100%{transform:translateY(-40px);opacity:0} 50%{transform:translateY(40px);opacity:1} }
  /* ── Nav Tabs ── */
  .nav-tabs { display: flex; background: #111827; border-top: 1px solid #1e2535; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; z-index: 100; }
  .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0 14px; cursor: pointer; border: none; background: none; color: #4a5568; transition: color 0.2s; font-family: inherit; }
  .nav-tab.active { color: #3a86ff; }
  .nav-tab .tab-icon { font-size: 20px; margin-bottom: 3px; }
  .nav-tab .tab-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }

  /* ── History ── */
  .hist-day { background: linear-gradient(135deg,#1a1f2e,#131824); border-radius: 16px; border: 1px solid #1e2535; overflow: hidden; margin-bottom: 0; }
  .hist-day-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; cursor: pointer; }
  .hist-day-date { font-size: 14px; font-weight: 700; }
  .hist-day-date.today { color: #3a86ff; }
  .hist-day-summary { font-size: 12px; color: #6b7a99; }
  .hist-day-cals { font-size: 14px; font-weight: 700; color: #3a86ff; }
  .hist-day-body { display: none; border-top: 1px solid #1e2535; }
  .hist-day-body.open { display: block; }
  .hist-macro-row { display: flex; justify-content: space-around; padding: 12px 16px; background: #0d1117; }
  .hist-macro-cell { text-align: center; }
  .hist-macro-label { font-size: 10px; color: #4a5568; text-transform: uppercase; letter-spacing: 0.06em; }
  .hist-macro-val { font-size: 15px; font-weight: 700; }
  .hist-entries { padding: 8px 12px 12px; display: flex; flex-direction: column; gap: 6px; }
  .hist-entry { display: flex; justify-content: space-between; padding: 8px 10px; background: #111827; border-radius: 8px; }
  .hist-entry-name { font-size: 12px; font-weight: 600; }
  .hist-entry-weight { font-size: 11px; color: #6b7a99; }
  .hist-entry-cals { font-size: 12px; font-weight: 700; color: #3a86ff; }
  .hist-entry-macros { font-size: 10px; color: #6b7a99; text-align: right; }
  .hist-bar { height: 4px; border-radius: 2px; margin: 0 16px 12px; background: #1e2535; overflow: hidden; }
  .hist-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg,#00d2ff,#3a86ff); }
  .hist-empty { text-align: center; color: #4a5568; font-size: 14px; padding: 40px 20px; }


  /* ── Weekly Graphs ── */
  .chart-card { background: linear-gradient(135deg,#1a1f2e,#131824); border-radius: 16px; padding: 18px; border: 1px solid #1e2535; }
  .chart-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .chart-title { font-size:16px; font-weight:700; }
  .chart-sub { font-size:11px; color:#6b7a99; }
  .chart-grid { display:grid; grid-template-columns:1fr; gap:12px; }
  .mini-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:12px; }
  .mini-stat { background:#111827; border-radius:10px; padding:10px; text-align:center; }
  .mini-stat-label { font-size:10px; color:#6b7a99; text-transform:uppercase; letter-spacing:0.06em; }
  .mini-stat-value { font-size:14px; font-weight:700; margin-top:4px; }

  /* ── Scanner Modal ── */
  .scanner-modal { position:fixed; inset:0; z-index:200; background:rgba(2,6,23,0.92); display:none; align-items:center; justify-content:center; padding:18px; }
  .scanner-modal.open { display:flex; }
  .scanner-shell { width:100%; max-width:480px; background:linear-gradient(135deg,#121826,#0d1320); border:1px solid #24304a; border-radius:22px; overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,.45); }
  .scanner-head { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; padding:18px; border-bottom:1px solid #1e2535; }
  .scanner-head h3 { font-size:17px; font-weight:700; }
  .scanner-head p { color:#7f8ba7; font-size:12px; margin-top:6px; line-height:1.4; }
  .scanner-close { background:#162033; border:1px solid #31415f; color:#dbe4ff; border-radius:14px; padding:12px 16px; font-size:13px; font-weight:700; cursor:pointer; min-width:92px; }
  .scanner-body { padding:18px; }
  .scanner-viewport { position:relative; border-radius:18px; overflow:hidden; background:#04070d; border:1px solid #22314e; min-height:320px; }
  .scanner-target { position:absolute; inset:0; }
  .scanner-frame { position:absolute; left:14%; right:14%; top:32%; bottom:32%; border:4px solid #3a86ff; border-radius:24px; box-shadow:0 0 0 9999px rgba(0,0,0,.28) inset; pointer-events:none; }
  .scanner-line { position:absolute; left:16%; right:16%; top:50%; height:2px; background:linear-gradient(90deg,transparent,#00d2ff,transparent); box-shadow:0 0 14px rgba(0,210,255,.8); animation: scanline 2.2s ease-in-out infinite; pointer-events:none; }
  .scanner-status { color:#8ea0c2; font-size:12px; margin:14px 0 10px; min-height:18px; }
  .scanner-controls { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .scanner-manual { margin-top:12px; display:grid; grid-template-columns:1fr auto; gap:10px; }
  .scanner-manual input { min-width:0; }
  .scanner-note { font-size:11px; color:#6b7a99; margin-top:10px; line-height:1.45; }


  .hidden { display: none !important; }
  .mt-10 { margin-top: 10px; }
  .mt-12 { margin-top: 12px; }
  .mt-16 { margin-top: 16px; }
  .mb-10 { margin-bottom: 10px; }
  .mb-12 { margin-bottom: 12px; }
  .hint { font-size: 11px; color: #4a5568; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="logo"><span>macro</span>scan</div>
      <div class="logo-sub" id="headerSub">Setup Required</div>
    </div>
    <div id="headerBtns" style="display:flex;gap:8px;"></div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
const TODAY = new Date().toISOString().slice(0,10);
const S = {
  screen: 'setup', // setup | summary | search | history
  unit: 'imperial',
  foodUnit: 'g',
  profile: { weightKg:'', heightCm:'', weightLbs:'', heightFt:'', heightIn:'', age:'', gender:'male', activity:'moderate', goal:'lean_bulk' },
  targets: null,
  entries: [],
  setupError: '',
  foodQuery: '',
  searchError: '',
  showCustom: false,
  customFood: { name:'', calories:'', protein:'', carbs:'', fat:'' },
  scannedFood: null,
  foodWeightDisplay: '100',
};

// ── Persist ────────────────────────────────────────────────────────────
function save() {
  try {
    localStorage.setItem('ms:profile', JSON.stringify(S.profile));
    localStorage.setItem('ms:unit', S.unit);
    localStorage.setItem('ms:foodUnit', S.foodUnit);
    if (S.targets) localStorage.setItem('ms:targets', JSON.stringify(S.targets));
    localStorage.setItem('ms:entries:' + TODAY, JSON.stringify(S.entries));
    // Track all logged dates
    const dates = getLoggedDates();
    if (!dates.includes(TODAY) && S.entries.length > 0) dates.unshift(TODAY);
    localStorage.setItem('ms:dates', JSON.stringify(dates));
  } catch(e) {}
}

function getLoggedDates() {
  try { return JSON.parse(localStorage.getItem('ms:dates') || '[]'); } catch(e) { return []; }
}

function getEntriesForDate(date) {
  try { return JSON.parse(localStorage.getItem('ms:entries:' + date) || '[]'); } catch(e) { return []; }
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const today = new Date(TODAY + 'T12:00:00');
  const diff = Math.round((today - d) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
}
function load() {
  try {
    const p = localStorage.getItem('ms:profile'); if (p) S.profile = JSON.parse(p);
    const u = localStorage.getItem('ms:unit'); if (u) S.unit = u;
    const fu = localStorage.getItem('ms:foodUnit'); if (fu) S.foodUnit = fu;
    const t = localStorage.getItem('ms:targets'); if (t) { S.targets = JSON.parse(t); S.screen = 'summary'; }
    const e = localStorage.getItem('ms:entries:' + TODAY); if (e) S.entries = JSON.parse(e);
    S.foodWeightDisplay = S.foodUnit === 'g' ? '100' : '3.5';
  } catch(e) {}
}

// ── Math ───────────────────────────────────────────────────────────────
const lbsToKg = l => l * 0.453592;
const ftInToCm = (f, i) => (f * 12 + parseFloat(i||0)) * 2.54;
const ozToG = o => o * 28.3495;
const gToOz = g => g / 28.3495;
function bmr(wKg, hCm, age, gender) {
  return gender === 'male'
    ? 88.362 + 1.397*wKg + 4.799*hCm - 5.677*age
    : 447.593 + 9.247*wKg + 3.098*hCm - 4.33*age;
}
function tdee(b, act) {
  return b * ({sedentary:1.2,light:1.375,moderate:1.55,active:1.725,very_active:1.9}[act]||1.55);
}
const GOALS = {
  bulk: {
    label: 'Bulk', icon: '🏋️', desc: 'Calorie surplus +300–500 · Build muscle mass',
    detail: '+300–500 cal above maintenance · Protein 0.8–1g/lb · Carbs 40–50% · Fat 20–30%',
    calOffset: +400, proteinPerLb: 0.9, carbPct: 0.45, fatPct: 0.25,
  },
  cut: {
    label: 'Cut', icon: '✂️', desc: 'Calorie deficit -300–500 · Maximize fat loss',
    detail: '-300–500 cal below maintenance · Protein 1–1.2g/lb · Carbs 25–40% · Fat 20–30%',
    calOffset: -400, proteinPerLb: 1.1, carbPct: 0.32, fatPct: 0.25,
  },
  lean_bulk: {
    label: 'Lean Bulk', icon: '💪', desc: 'Maintenance to +200 · Muscle with minimal fat',
    detail: 'Maint to +200 cal · Protein 1g/lb · Carbs 40–50% · Fat 25–35%',
    calOffset: +150, proteinPerLb: 1.0, carbPct: 0.45, fatPct: 0.30,
  },
  fat_loss: {
    label: 'Fat Loss', icon: '🔥', desc: 'Calorie deficit -300–500 · General fat loss',
    detail: '-300–500 cal below maintenance · Protein 0.8–1g/lb · Carbs 30–40% · Fat 25–35%',
    calOffset: -400, proteinPerLb: 0.9, carbPct: 0.35, fatPct: 0.30,
  },
  recomp: {
    label: 'Recomp', icon: '⚖️', desc: 'Maintenance calories · Lose fat + gain muscle',
    detail: 'Maint / -100–200 cal · Protein 1–1.2g/lb · Carbs 35–45% · Fat 25–35%',
    calOffset: -150, proteinPerLb: 1.1, carbPct: 0.40, fatPct: 0.30,
  },
};

// wLbs: bodyweight in pounds (needed for protein-per-lb targets)
function computeTargets(TDEE, goal, wLbs) {
  const g = GOALS[goal];
  const calories = Math.round(TDEE + g.calOffset);
  // Protein: g per lb of bodyweight
  const protein = Math.round(wLbs * g.proteinPerLb);
  // Carbs and fat from remaining calories after protein is set
  const proteinCals = protein * 4;
  const remaining = calories - proteinCals;
  // Use ratio of carb:fat pct to split remaining
  const total = g.carbPct + g.fatPct;
  const carbs = Math.round((remaining * (g.carbPct / total)) / 4);
  const fat = Math.round((remaining * (g.fatPct / total)) / 9);
  return { calories, protein, carbs, fat };
}
function getFoodWeightInGrams() {
  const v = parseFloat(S.foodWeightDisplay);
  if (!v || v <= 0) return 0;
  return S.foodUnit === 'g' ? v : ozToG(v);
}
function getTotals() {
  return S.entries.reduce((a,e) => ({ calories: a.calories+e.calories, protein: a.protein+e.protein, carbs: a.carbs+e.carbs, fat: a.fat+e.fat }), {calories:0,protein:0,carbs:0,fat:0});
}

// ── Food DB ────────────────────────────────────────────────────────────
const FOOD_DB = [
  { name:"Chicken Breast (cooked)", calories:165, protein:31, carbs:0, fat:3.6, tags:["chicken","breast","grilled","baked"] },
  { name:"Chicken Thigh (cooked)", calories:209, protein:26, carbs:0, fat:11, tags:["chicken","thigh"] },
  { name:"Ground Beef 80/20", calories:254, protein:17, carbs:0, fat:20, tags:["beef","ground","hamburger"] },
  { name:"Ground Beef 93/7 Lean", calories:152, protein:21, carbs:0, fat:7, tags:["beef","ground","lean"] },
  { name:"Ground Turkey", calories:149, protein:19, carbs:0, fat:8, tags:["turkey","ground"] },
  { name:"Salmon (cooked)", calories:208, protein:20, carbs:0, fat:13, tags:["salmon","fish"] },

function searchFood(q) {
  const words = q.toLowerCase().trim().split(/\s+/);
  const scored = FOOD_DB.map(f => {
    const hay = (f.name + ' ' + f.tags.join(' ')).toLowerCase();
    let score = 0;
    words.forEach(w => { if (hay.includes(w)) score += w.length; });
    if (f.name.toLowerCase().includes(q.toLowerCase().trim())) score += 20;
    return { f, score };
  }).filter(x => x.score > 0).sort((a,b) => b.score - a.score);
  if (!scored.length) return null;
  const f = scored[0].f;
  return { name:f.name, calories:f.calories, protein:f.protein, carbs:f.carbs, fat:f.fat, serving:100 };
}

// ── SVG Ring ───────────────────────────────────────────────────────────
function ringHTML(value, max, color, label, size=80) {
  const pct = Math.min(value/max, 1);
  const r = (size-12)/2;
  const circ = 2*Math.PI*r;
  const dash = pct*circ;
  const cx = size/2, cy = size/2;
  return `<div class="ring-wrap">
    <svg width="${size}" height="${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1e2535" stroke-width="10"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="10"
        stroke-dasharray="${dash} ${circ}" stroke-linecap="round"
        transform="rotate(-90 ${cx} ${cy})" style="transition:stroke-dasharray 0.6s"/>
      <text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle"
        fill="white" style="font-size:13px;font-family:DM Sans,sans-serif;font-weight:700">${value}</text>
    </svg>
    <div class="ring-label">${label}</div>
  </div>`;
}


function getWeeklySnapshots() {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86400000);
    const ds = d.toISOString().slice(0,10);
    const entries = ds === TODAY ? S.entries : getEntriesForDate(ds);
    const totals = entries.reduce((a,e) => ({
      calories: a.calories + (e.calories || 0),
      protein: a.protein + (e.protein || 0),
      carbs: a.carbs + (e.carbs || 0),
      fat: a.fat + (e.fat || 0),
    }), { calories:0, protein:0, carbs:0, fat:0 });
    days.push({
      date: ds,
      label: new Date(ds + 'T12:00:00').toLocaleDateString('en-US', { weekday:'short' }),
      ...totals,
    });
  }
  return days;
}
function renderWeeklyChartCard() {
  const week = getWeeklySnapshots();

  }), { calories:0, protein:0, carbs:0, fat:0 });
  const activeDays = week.filter(d => d.calories > 0).length;
  const peak = week.reduce((m,d) => Math.max(m,d.calories), 0);
  return `

function drawLineChart(canvasId, series, options={}) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || canvas.width || 320;
  const cssH = canvas.getAttribute('height') ? parseInt(canvas.getAttribute('height')) : (canvas.clientHeight || 180);
  canvas.width = cssW * dpr;
  canvas.height = cssH * dpr;
  ctx.scale(dpr, dpr);
  const width = cssW, height = cssH;
  ctx.clearRect(0,0,width,height);
  const pad = { left: 32, right: 10, top: 12, bottom: 28 };
  const plotW = width - pad.left - pad.right;
  const plotH = height - pad.top - pad.bottom;
  const labels = series[0]?.data.map((p) => p.label) || [];
  const maxVal = Math.max(1, ...series.flatMap(s => s.data.map(p => p.value)));
  const niceMax = Math.ceil(maxVal / 100) * 100 || 100;
  ctx.strokeStyle = '#22304a';
  ctx.lineWidth = 1;
  ctx.font = '11px DM Sans, sans-serif';
  ctx.fillStyle = '#6b7a99';
  for (let i=0;i<=4;i++) {
    const y = pad.top + (plotH * i / 4);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(width - pad.right, y); ctx.stroke();
    const val = Math.round(niceMax * (1 - i/4));
    ctx.fillText(String(val), 2, y + 3);
  }
  labels.forEach((lab, i) => {
    const x = pad.left + (plotW * (labels.length===1 ? 0.5 : i/(labels.length-1)));
    ctx.fillText(lab, x - 10, height - 8);
  });
  series.forEach(s => {
    ctx.beginPath();
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = s.color;
    s.data.forEach((p, i) => {
      const x = pad.left + (plotW * (s.data.length===1 ? 0.5 : i/(s.data.length-1)));
      const y = pad.top + plotH - (p.value / niceMax) * plotH;
      if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke();
    s.data.forEach((p, i) => {
      const x = pad.left + (plotW * (s.data.length===1 ? 0.5 : i/(s.data.length-1)));
      const y = pad.top + plotH - (p.value / niceMax) * plotH;
      ctx.beginPath(); ctx.fillStyle = s.color; ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
    });
  });
}
function drawWeeklyCharts() {
  const week = getWeeklySnapshots();
  drawLineChart('weeklyCaloriesChart', [{
    color: '#3a86ff',
    data: week.map(d => ({ label:d.label, value:Math.round(d.calories) }))
  }]);
  drawLineChart('weeklyMacrosChart', [
    { color:'#ff6b6b', data: week.map(d => ({ label:d.label, value:Math.round(d.protein) })) },
    { color:'#ffd166', data: week.map(d => ({ label:d.label, value:Math.round(d.carbs) })) },
    { color:'#06d6a0', data: week.map(d => ({ label:d.label, value:Math.round(d.fat) })) },
  ]);
}

function render() {
  const totals = getTotals();
  renderHeader(totals);
  if (S.screen === 'setup') renderSetup();
  else if (S.screen === 'summary') renderSummary(totals);
  else if (S.screen === 'search') renderSearch();
  else if (S.screen === 'history') renderHistory();
  renderNav();
  requestAnimationFrame(() => {
    if (S.screen === 'summary') drawWeeklyCharts();
  });
}

function renderNav() {
  let nav = document.getElementById('nav-tabs');
  if (!nav) {
    nav = document.createElement('div');
    nav.id = 'nav-tabs';
    nav.className = 'nav-tabs';
    document.getElementById('app').appendChild(nav);

  const tabs = [
    { id:'summary', icon:'📊', label:'Today' },
    { id:'history', icon:'📅', label:'History' },
    { id:'setup', icon:'⚙️', label:'Settings' },

  nav.innerHTML = tabs.map(t => `

      <div class="tab-label">${t.label}</div>
    </button>`).join('');
}

      <div class="log-entries">
        ${S.entries.map((e,i) => `
          <div class="log-entry">
            <div><div class="log-entry-name">${e.name}</div><div class="log-entry-weight">${e.displayWeight}${e.displayUnit}</div></div>
            <div class="log-entry-right"><div class="log-entry-cals">${e.calories} kcal</div><div class="log-entry-macros">P:${e.protein} C:${e.carbs} F:${e.fat}</div></div>
            <button class="btn-delete" onclick="deleteEntry(${i})">✕</button>
          </div>`).join('')}
      </div>
    </div>` : ''}
  `;
}

function renderSearch() {
  if (S.scannedFood) { renderFoodResult(); return; }
  const fu = S.foodUnit;
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:8px">
        <label class="field-label" style="margin-bottom:0">Search Food</label>
        <button class="btn-secondary" style="width:auto;padding:9px 12px" onclick="openScanner()">📷 Scan</button>
      </div>
      <div class="hint mb-10">Try: "chicken breast", "kodiak cakes", "brown rice", "greek yogurt", "quest bar"</div>
      <div style="display:flex;gap:8px">
        <input type="text" id="foodQueryInput" placeholder="e.g. chicken breast" value="${S.foodQuery}" style="flex:1"
          onkeydown="if(event.key==='Enter')doSearch()">
        <button class="btn-primary" style="width:auto;padding:10px 16px;border-radius:10px;white-space:nowrap" onclick="doSearch()">Search</button>
      </div>
    </div>

    ${S.searchError ? `<div class="error-box">${S.searchError}</div>` : ''}

    <div class="card" style="padding:0;overflow:hidden">
      <button class="custom-toggle" onclick="toggleCustom()">
        <span>✏️ Enter Custom Food Manually</span><span id="customArrow">${S.showCustom?'▲':'▼'}</span>
      </button>
      <div class="custom-body ${S.showCustom?'open':''}" id="customBody">
        <div class="mb-10"><label class="field-label">Food Name</label>
          <input type="text" placeholder="e.g. My Protein Shake" value="${S.customFood.name}" oninput="S.customFood.name=this.value">
        </div>
        <div class="grid-4 mb-12">
          ${[['calories','Calories (kcal)','200'],['protein','Protein (g)','25'],['carbs','Carbs (g)','10'],['fat','Fat (g)','5']].map(([f,l,ph]) => `
            <div><label class="field-label">${l}</label>
              <input type="number" placeholder="${ph}" value="${S.customFood[f]}" oninput="S.customFood['${f}']=this.value">
            </div>`).join('')}
        </div>
        <div class="hint mb-10">Values are per 100g serving</div>
        <button class="btn-primary" onclick="useCustomFood()">Use This Food →</button>
      </div>
    </div>
  `;
  document.getElementById('foodQueryInput')?.focus();
}

function renderFoodResult() {
  const f = S.scannedFood;
  const fu = S.foodUnit;
  const grams = getFoodWeightInGrams();
  const ratio = grams / (f.serving || 100);
  const servingDisp = fu === 'g' ? `per ${f.serving||100}g` : `per ${Math.round(gToOz(f.serving||100)*100)/100}oz`;

  document.getElementById('content').innerHTML = `
    <div class="food-result-card">
      <div class="food-name">${f.name}</div>
      <div class="food-sub" style="font-family:'DM Mono',monospace">${f.barcode||''}</div>
      <div class="grid-4 mb-12">
        ${[['Calories',f.calories,'kcal','#3a86ff'],['Protein',f.protein,'g','#ff6b6b'],['Carbs',f.carbs,'g','#ffd166'],['Fat',f.fat,'g','#06d6a0']].map(([l,v,u,c]) => `
          <div class="macro-tile">
            <div class="macro-tile-label">${l}</div>
            <div class="macro-tile-val" style="color:${c}">${v}<span>${u}</span></div>
            <div class="macro-tile-sub">${servingDisp}</div>
          </div>`).join('')}
      </div>
      <label class="field-label">Amount (${fu})</label>
      <div class="amount-wrap">
        <input type="number" id="amountInput" value="${S.foodWeightDisplay}" placeholder="${fu==='g'?'100':'3.5'}"
          style="padding-right:40px" oninput="S.foodWeightDisplay=this.value;updatePreview()">
        <span class="amount-unit">${fu}</span>
      </div>
      <div class="preview-row" id="previewRow" style="${grams>0?'':'display:none'}" >
        <div class="preview-cell"><div class="preview-label">Cals</div><div class="preview-val" style="color:#3a86ff">${Math.round(f.calories*ratio)}</div></div>
        <div class="preview-cell"><div class="preview-label">P</div><div class="preview-val" style="color:#ff6b6b">${Math.round(f.protein*ratio*10)/10}g</div></div>
        <div class="preview-cell"><div class="preview-label">C</div><div class="preview-val" style="color:#ffd166">${Math.round(f.carbs*ratio*10)/10}g</div></div>
        <div class="preview-cell"><div class="preview-label">F</div><div class="preview-val" style="color:#06d6a0">${Math.round(f.fat*ratio*10)/10}g</div></div>
      </div>
    </div>
    <button class="btn-primary" onclick="addEntry()">+ Add to Log</button>
    <button class="btn-secondary" onclick="S.scannedFood=null;S.foodQuery='';S.searchError='';S.showCustom=false;render()">↩ Search Another</button>
  `;
}

// ── History Screen ────────────────────────────────────────────────────
function renderHistory() {
  const dates = getLoggedDates();
  // Also include today if it has entries but hasn't been saved to dates yet
  if (S.entries.length > 0 && !dates.includes(TODAY)) dates.unshift(TODAY);
  
  if (!dates.length) {
    document.getElementById('content').innerHTML = `
      <div class="hist-empty">
        <div style="font-size:40px;margin-bottom:12px">📅</div>
        <div style="font-weight:700;margin-bottom:6px">No history yet</div>
        <div>Start logging food and your days will appear here.</div>
      </div>`;
    return;
  }

  const t = S.targets;
  document.getElementById('content').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:10px">
      ${dates.map((date, di) => {
        const entries = date === TODAY ? S.entries : getEntriesForDate(date);
        const totals = entries.reduce((a,e) => ({
          calories: a.calories+e.calories, protein: a.protein+e.protein,
          carbs: a.carbs+e.carbs, fat: a.fat+e.fat
        }), {calories:0,protein:0,carbs:0,fat:0});
        const pct = t ? Math.min(totals.calories/t.calories,1)*100 : 0;
        const isToday = date === TODAY;
        return `
        <div class="hist-day">
          <div class="hist-day-header" onclick="toggleHistDay('hist-${di}')">
            <div>
              <div class="hist-day-date ${isToday?'today':''}">${formatDate(date)}</div>
              <div class="hist-day-summary">${entries.length} item${entries.length!==1?'s':''} logged</div>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              <div class="hist-day-cals">${totals.calories} kcal</div>
              <span style="color:#4a5568;font-size:12px" id="arrow-hist-${di}">▼</span>
            </div>
          </div>
          ${t ? `<div class="hist-bar"><div class="hist-bar-fill" style="width:${pct}%"></div></div>` : ''}
          <div class="hist-day-body" id="hist-${di}">
            <div class="hist-macro-row">
              <div class="hist-macro-cell"><div class="hist-macro-label">Protein</div><div class="hist-macro-val" style="color:#ff6b6b">${Math.round(totals.protein)}g</div></div>
              <div class="hist-macro-cell"><div class="hist-macro-label">Carbs</div><div class="hist-macro-val" style="color:#ffd166">${Math.round(totals.carbs)}g</div></div>
              <div class="hist-macro-cell"><div class="hist-macro-label">Fat</div><div class="hist-macro-val" style="color:#06d6a0">${Math.round(totals.fat)}g</div></div>
              ${t ? `<div class="hist-macro-cell"><div class="hist-macro-label">Target</div><div class="hist-macro-val" style="color:#4a5568">${t.calories}</div></div>` : ''}
            </div>
            ${entries.length > 0 ? `
            <div class="hist-entries">
              ${entries.map(e => `
                <div class="hist-entry">
                  <div><div class="hist-entry-name">${e.name}</div><div class="hist-entry-weight">${e.displayWeight}${e.displayUnit}</div></div>
                  <div><div class="hist-entry-cals">${e.calories} kcal</div><div class="hist-entry-macros">P:${e.protein} C:${e.carbs} F:${e.fat}</div></div>
                </div>`).join('')}
            </div>` : '<div style="padding:12px 16px;color:#4a5568;font-size:13px">No entries</div>'}
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function toggleHistDay(id) {
  const body = document.getElementById(id);
  const arrow = document.getElementById('arrow-' + id);
  if (!body) return;
  const open = body.classList.toggle('open');
  if (arrow) arrow.textContent = open ? '▲' : '▼';
}

// ── Handlers ───────────────────────────────────────────────────────────
function setUnit(u) { S.unit = u; save(); render(); }
function setFoodUnit(u) { S.foodUnit = u; S.foodWeightDisplay = u==='g'?'100':'3.5'; save(); render(); }
function goSearch() { S.screen='search'; S.scannedFood=null; S.searchError=''; render(); }

function handleSetup() {
  S.setupError = '';
  let wKg, hCm;
  const p = S.profile;
  if (S.unit === 'metric') {
    const rw = parseFloat(p.weightKg), rh = parseFloat(p.heightCm);
    if (!rw || rw<=0) { S.setupError='Please enter a valid weight.'; render(); return; }
    if (!rh || rh<=0) { S.setupError='Please enter a valid height.'; render(); return; }
    wKg=rw; hCm=rh;
  } else {
    const rw = parseFloat(p.weightLbs), rf = parseFloat(p.heightFt);
    if (!rw || rw<=0) { S.setupError='Please enter a valid weight in lbs.'; render(); return; }
    if (!rf || rf<=0) { S.setupError='Please enter a valid height (feet).'; render(); return; }
    wKg = lbsToKg(rw); hCm = ftInToCm(rf, p.heightIn);
  }
  const wLbs = wKg / 0.453592; // always need lbs for protein-per-lb calc
  const b = bmr(wKg, hCm, parseInt(p.age)||30, p.gender);
  S.targets = computeTargets(tdee(b, p.activity), p.goal, wLbs);
  S.screen = 'summary';
  save(); render();
}

function doSearch() {
  const q = document.getElementById('foodQueryInput')?.value || S.foodQuery;
  S.foodQuery = q;
  if (!q.trim()) return;
  const food = searchFood(q.trim());
  if (food) { S.scannedFood = { ...food, barcode: q.trim() }; S.searchError = ''; }
  else S.searchError = `No match for "${q}". Try a different name or use Custom Entry below.`;
  render();
}

function toggleCustom() {
  S.showCustom = !S.showCustom; render();
}

function useCustomFood() {
  if (!S.customFood.name) return;
  S.scannedFood = {
    name: S.customFood.name,
    calories: parseFloat(S.customFood.calories)||0,
    protein: parseFloat(S.customFood.protein)||0,
    carbs: parseFloat(S.customFood.carbs)||0,
    fat: parseFloat(S.customFood.fat)||0,
    serving: 100, barcode: 'custom'
  };
  S.showCustom = false; render();
}

function updatePreview() {
  const grams = getFoodWeightInGrams();
  const f = S.scannedFood;
  if (!f) return;
  const ratio = grams / (f.serving||100);
  const row = document.getElementById('previewRow');
  if (!row) return;
  if (grams <= 0) { row.style.display='none'; return; }
  row.style.display='flex';
  row.innerHTML = `
    <div class="preview-cell"><div class="preview-label">Cals</div><div class="preview-val" style="color:#3a86ff">${Math.round(f.calories*ratio)}</div></div>
    <div class="preview-cell"><div class="preview-label">P</div><div class="preview-val" style="color:#ff6b6b">${Math.round(f.protein*ratio*10)/10}g</div></div>
    <div class="preview-cell"><div class="preview-label">C</div><div class="preview-val" style="color:#ffd166">${Math.round(f.carbs*ratio*10)/10}g</div></div>
    <div class="preview-cell"><div class="preview-label">F</div><div class="preview-val" style="color:#06d6a0">${Math.round(f.fat*ratio*10)/10}g</div></div>
  `;
}

function addEntry() {
  const f = S.scannedFood; if (!f) return;
  const grams = getFoodWeightInGrams(); if (!grams) return;
  const ratio = grams / (f.serving||100);
  S.entries.push({
    id: Date.now(), name: f.name,
    grams: Math.round(grams*10)/10,
    displayWeight: parseFloat(S.foodWeightDisplay),
    displayUnit: S.foodUnit,
    calories: Math.round(f.calories*ratio),
    protein: Math.round(f.protein*ratio*10)/10,
    carbs: Math.round(f.carbs*ratio*10)/10,
    fat: Math.round(f.fat*ratio*10)/10,
  });
  S.scannedFood = null; S.foodQuery = ''; S.screen = 'summary';
  save(); render();
}

function deleteEntry(i) {
  S.entries.splice(i,1); save(); render();
}


// ── Scanner / Barcode Lookup ───────────────────────────────────────────
let quaggaReady = false;
let quaggaDetectedHandler = null;

function setScannerStatus(msg) {
  const el = document.getElementById('scannerStatus');
  if (el) el.textContent = msg;
}
function openScanner() {
  const modal = document.getElementById('scannerModal');
  if (modal) {
    modal.classList.add('open');
    modal.setAttribute('aria-hidden', 'false');
  }
  setScannerStatus('Ready to scan.');
}
function stopScanner() {
  try {
    if (window.Quagga) {
      window.Quagga.offDetected(quaggaDetectedHandler);
      window.Quagga.stop();
    }
  } catch(e) {}
  quaggaReady = false;
  setScannerStatus('Camera stopped.');
}
function closeScanner() {
  stopScanner();
  const modal = document.getElementById('scannerModal');
  if (modal) {
    modal.classList.remove('open');
    modal.setAttribute('aria-hidden', 'true');
  }
}
function startScanner() {
  if (!window.isSecureContext) {
    setScannerStatus('Camera scanning needs HTTPS. GitHub Pages is fine; local files are not.');
    return;
  }
  if (!window.Quagga) {
    setScannerStatus('Scanner library failed to load. Use manual barcode entry below.');
    return;
  }
  stopScanner();
  setScannerStatus('Requesting camera permission...');
  const target = document.getElementById('scannerTarget');
  quaggaDetectedHandler = (result) => {
    const code = result?.codeResult?.code;
    if (!code) return;
    setScannerStatus('Found barcode ' + code + '. Looking it up...');
    stopScanner();
    lookupBarcode(code);
  };
  window.Quagga.init({
    inputStream: {
      type: 'LiveStream',
      target,
      constraints: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      },
      area: {
        top: '30%',
        right: '12%',
        left: '12%',
        bottom: '30%'
      }
    },
    locator: { patchSize: 'medium', halfSample: true },
    numOfWorkers: navigator.hardwareConcurrency ? Math.min(4, navigator.hardwareConcurrency) : 2,
    frequency: 10,
    decoder: {
      readers: ['ean_reader', 'ean_8_reader', 'upc_reader', 'upc_e_reader', 'code_128_reader']
    },
    locate: true
  }, function(err) {
    if (err) {
      console.error(err);
      setScannerStatus('Camera could not start. Check Safari camera permission, then try again.');
      return;
    }
    window.Quagga.onDetected(quaggaDetectedHandler);
    window.Quagga.start();
    quaggaReady = true;
    setScannerStatus('Point the barcode inside the blue box.');
  });
}
async function lookupBarcode(code) {
  try {
    const clean = String(code || '').trim();
    if (!clean) {
      setScannerStatus('Enter a valid barcode.');
      return;
    }
    setScannerStatus('Looking up barcode ' + clean + '...');
    const res = await fetch('https://world.openfoodfacts.org/api/v2/product/' + encodeURIComponent(clean) + '.json');
    if (!res.ok) throw new Error('lookup failed');
    const data = await res.json();
    const product = data && data.product;
    const nutr = product && product.nutriments ? product.nutriments : null;
    if (!product || !nutr) throw new Error('not found');
    const calories = Number(nutr['energy-kcal_100g'] ?? nutr['energy-kcal'] ?? 0);
    const protein = Number(nutr.proteins_100g ?? nutr.proteins ?? 0);
    const carbs = Number(nutr.carbohydrates_100g ?? nutr.carbohydrates ?? 0);
    const fat = Number(nutr.fat_100g ?? nutr.fat ?? 0);
    const serving = Number(product.product_quantity || 100) > 0 ? 100 : 100;
    S.scannedFood = {
      name: product.product_name || ('Barcode ' + clean),
      calories: Math.round(calories * 10) / 10,
      protein: Math.round(protein * 10) / 10,
      carbs: Math.round(carbs * 10) / 10,
      fat: Math.round(fat * 10) / 10,
      serving,
      barcode: clean
    };
    S.screen = 'search';
    S.searchError = '';
    S.foodWeightDisplay = S.foodUnit === 'g' ? '100' : '3.5';
    closeScanner();
    render();
  } catch (err) {
    console.error(err);
    setScannerStatus('No barcode match found. You can still type the code or use custom food.');
  }
}
function submitManualBarcode() {
  const input = document.getElementById('manualBarcodeInput');
  const code = input ? input.value.trim() : '';
  if (!code) {
    setScannerStatus('Type a UPC/EAN first.');
    return;
  }
  lookupBarcode(code);
}

// ── Boot ───────────────────────────────────────────────────────────────
load();
render();
</script>

  <div class="scanner-shell">
    <div class="scanner-head">
      <div>
        <h3>Scan Barcode</h3>
        <p>iPhone will ask for camera permission the first time. If scanning struggles, type the UPC/EAN manually below.</p>
      </div>
      <button class="scanner-close" onclick="closeScanner()">Close</button>
    </div>
    <div class="scanner-body">
      <div class="scanner-viewport">
        <div id="scannerTarget" class="scanner-target"></div>
        <div class="scanner-frame"></div>
        <div class="scanner-line"></div>
      </div>
      <div id="scannerStatus" class="scanner-status">Ready to scan.</div>
      <div class="scanner-manual">
        <input id="manualBarcodeInput" type="text" inputmode="numeric" placeholder="Type UPC / EAN">
        <button class="btn-secondary" onclick="submitManualBarcode()">Use Code</button>
      </div>
      <div class="scanner-controls">
        <button class="btn-primary" onclick="startScanner()">Start Camera</button>
        <button class="btn-secondary" onclick="stopScanner()">Stop Camera</button>
      </div>
      <div class="scanner-note">Scanning works best over HTTPS with the rear camera. This version prefers the back camera and closes cleanly when you tap Close.</div>
    </div>
  </div>
</div>
<script src="https://unpkg.com/@ericblade/quagga2@1.12.1/dist/quagga.min.js"></script>

</body>
